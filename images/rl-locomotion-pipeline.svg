<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4fd1c5" stroke="none"/>
    </marker>
    <marker id="arr-w" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e8a87c" stroke="none"/>
    </marker>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161619"/>
      <stop offset="100%" stop-color="#111114"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="380" fill="#0a0a0c" rx="12"/>

  <!-- ============ ROW 1: MAIN PIPELINE ============ -->

  <!-- Environment -->
  <rect x="30" y="40" width="180" height="130" rx="10" fill="url(#cg)" stroke="#1e1e24" stroke-width="1"/>
  <rect x="30" y="40" width="180" height="3" rx="2" fill="#4fd1c5" opacity="0.6"/>
  <text x="120" y="68" text-anchor="middle" fill="#4fd1c5" font-size="10" font-weight="500" letter-spacing="1">ENVIRONMENT</text>
  <text x="120" y="90" text-anchor="middle" fill="#e8e6e3" font-size="12" font-weight="500">MuJoCo Playground</text>
  <text x="120" y="112" text-anchor="middle" fill="#8a8a96" font-size="9">Unitree G1 Humanoid</text>
  <text x="120" y="128" text-anchor="middle" fill="#8a8a96" font-size="9">Full-body physics sim</text>
  <text x="120" y="144" text-anchor="middle" fill="#8a8a96" font-size="9">Contact &amp; collision dynamics</text>
  <text x="120" y="160" text-anchor="middle" fill="#55555f" font-size="8">State: [q, q̇, v_cmd]  →  Action: joint torques</text>

  <!-- Arrow -->
  <line x1="210" y1="105" x2="248" y2="105" stroke="#4fd1c5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PPO Agent -->
  <rect x="253" y="40" width="180" height="130" rx="10" fill="url(#cg)" stroke="#4fd1c5" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="253" y="40" width="180" height="3" rx="2" fill="#4fd1c5" opacity="0.8"/>
  <text x="343" y="68" text-anchor="middle" fill="#4fd1c5" font-size="10" font-weight="500" letter-spacing="1">RL AGENT</text>
  <text x="343" y="90" text-anchor="middle" fill="#e8e6e3" font-size="12" font-weight="500">PPO Actor-Critic</text>
  <text x="343" y="112" text-anchor="middle" fill="#8a8a96" font-size="9">Actor → joint torque commands</text>
  <text x="343" y="128" text-anchor="middle" fill="#8a8a96" font-size="9">Critic → value estimate</text>
  <text x="343" y="148" text-anchor="middle" fill="#8a8a96" font-size="9">Observation encoding</text>

  <!-- Arrow -->
  <line x1="433" y1="105" x2="471" y2="105" stroke="#4fd1c5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Reward -->
  <rect x="476" y="40" width="200" height="130" rx="10" fill="url(#cg)" stroke="#e8a87c" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="476" y="40" width="200" height="3" rx="2" fill="#e8a87c" opacity="0.6"/>
  <text x="576" y="68" text-anchor="middle" fill="#e8a87c" font-size="10" font-weight="500" letter-spacing="1">REWARD SHAPING</text>
  <text x="576" y="90" text-anchor="middle" fill="#e8e6e3" font-size="12" font-weight="500">Multi-Objective Rewards</text>

  <circle cx="496" cy="108" r="3" fill="#4fd1c5"/>
  <text x="506" y="112" fill="#8a8a96" font-size="9">Velocity tracking</text>

  <circle cx="496" cy="126" r="3" fill="#e8a87c"/>
  <text x="506" y="130" fill="#8a8a96" font-size="9">Gait quality &amp; foot clearance</text>

  <circle cx="496" cy="144" r="3" fill="#a78bfa"/>
  <text x="506" y="148" fill="#8a8a96" font-size="9">Stability &amp; energy efficiency</text>

  <circle cx="496" cy="162" r="3" fill="#ef4444" opacity="0.6"/>
  <text x="506" y="166" fill="#8a8a96" font-size="9">Termination penalties</text>

  <!-- Arrow -->
  <line x1="676" y1="105" x2="714" y2="105" stroke="#e8a87c" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- Evaluation -->
  <rect x="719" y="40" width="250" height="130" rx="10" fill="url(#cg)" stroke="#1e1e24" stroke-width="1"/>
  <rect x="719" y="40" width="250" height="3" rx="2" fill="#a78bfa" opacity="0.5"/>
  <text x="844" y="68" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="500" letter-spacing="1">EVALUATION</text>
  <text x="844" y="90" text-anchor="middle" fill="#e8e6e3" font-size="12" font-weight="500">Gait Analysis (50 velocities)</text>

  <circle cx="739" cy="112" r="3" fill="#8a8a96"/>
  <text x="749" y="116" fill="#8a8a96" font-size="9">Speed tracking accuracy</text>

  <circle cx="739" cy="130" r="3" fill="#8a8a96"/>
  <text x="749" y="134" fill="#8a8a96" font-size="9">Stride frequency &amp; length</text>

  <circle cx="739" cy="148" r="3" fill="#8a8a96"/>
  <text x="749" y="152" fill="#8a8a96" font-size="9">Foot swing clearance</text>

  <circle cx="739" cy="166" r="3" fill="#8a8a96"/>
  <text x="749" y="170" fill="#8a8a96" font-size="9">Gait symmetry</text>

  <!-- ============ ROW 2: TERRAIN TRANSFER ============ -->

  <!-- Flat terrain -->
  <rect x="140" y="230" width="280" height="70" rx="10" fill="url(#cg)" stroke="#4fd1c5" stroke-width="1" stroke-opacity="0.4"/>
  <text x="175" y="260" fill="#4fd1c5" font-size="10" font-weight="500">STAGE 1</text>
  <text x="240" y="260" fill="#e8e6e3" font-size="11" font-weight="500">Train on Flat Terrain</text>
  <text x="280" y="280" text-anchor="middle" fill="#8a8a96" font-size="9">G1JoystickFlatTerrain — learn stable walking gait</text>

  <!-- Arrow -->
  <line x1="420" y1="265" x2="478" y2="265" stroke="#e8a87c" stroke-width="1.5" marker-end="url(#arr-w)"/>
  <text x="449" y="258" text-anchor="middle" fill="#55555f" font-size="8">retrain</text>

  <!-- Rough terrain -->
  <rect x="483" y="230" width="280" height="70" rx="10" fill="url(#cg)" stroke="#e8a87c" stroke-width="1" stroke-opacity="0.4"/>
  <text x="518" y="260" fill="#e8a87c" font-size="10" font-weight="500">STAGE 2</text>
  <text x="590" y="260" fill="#e8e6e3" font-size="11" font-weight="500">Transfer to Rough Terrain</text>
  <text x="623" y="280" text-anchor="middle" fill="#8a8a96" font-size="9">G1JoystickRoughTerrain — adapt to uneven surfaces</text>

  <!-- Footer label -->
  <text x="500" y="345" text-anchor="middle" fill="#55555f" font-size="9" letter-spacing="0.5">Unitree G1  ·  MuJoCo Playground  ·  PPO  ·  Smooth → Rough terrain transfer</text>

</svg>
